name: Mani APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Inject User HTML
        run: |
          mkdir -p assets
          echo "${{ github.event.client_payload.html_code }}" > assets/index.html
          echo "Mani, Cloud Build Start ayyindi!"
          
